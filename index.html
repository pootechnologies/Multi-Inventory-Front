<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Po'o Inventory</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="description" content="Multi-Inventory Management System" />
    <meta name="theme-color" content="#059669" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Inventory" />
    <style>
      #initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #ffffff;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        gap: 20px;
      }

      .loader-ring {
        width: 52px;
        height: 52px;
        border: 4px solid #e2e8f0;
        border-top-color: #059669;
        border-radius: 50%;
        animation: spin 0.85s linear infinite;
      }

      .loader-dots {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 15px;
        font-weight: 600;
        color: #475569;
        letter-spacing: 0.01em;
      }

      .loader-dots span {
        display: inline-block;
        animation: bounce 1.2s ease-in-out infinite;
      }

      .loader-dots span:nth-child(2) {
        animation-delay: 0.1s;
      }

      .loader-dots span:nth-child(3) {
        animation-delay: 0.2s;
      }

      .loader-dots span:nth-child(4) {
        animation-delay: 0.3s;
      }

      .loader-dots span:nth-child(5) {
        animation-delay: 0.4s;
      }

      .loader-dots span:nth-child(6) {
        animation-delay: 0.5s;
      }

      .loader-dots span:nth-child(7) {
        animation-delay: 0.6s;
      }

      .loader-dots span:nth-child(8) {
        animation-delay: 0.7s;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }

        40% {
          transform: translateY(-6px);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="loader-ring"></div>
        <div class="loader-dots">
          <span>L</span><span>o</span><span>a</span><span>d</span><span>i</span
          ><span>n</span><span>g</span><span>…</span>
        </div>
      </div>
    </div>
    <script type="module">
      import { Buffer } from "buffer";
      window.Buffer = window.Buffer || Buffer;
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
